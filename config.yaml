# ============================================================================
#  Конфигурация mini-SIEM
#  Здесь - ДАННЫЕ. Код движка C++ их только читает и исполняет.
#  Чтобы добавить новый тип лога или атаки, правишь этот файл, не код.
# ============================================================================

# --- Регулярки: одна на каждый тип события. -------------------------------
# Именованные группы (?P<имя>...) становятся полями события.
# Кавычки одинарные, чтобы YAML не трогал обратные слэши в regex.
patterns:
  ssh_failed:   'Failed password for (?:invalid user )?(?P<user>\S+) from (?P<ip>\S+)'
  ssh_invalid:  'Invalid user (?P<user>\S+) from (?P<ip>\S+)'
  ssh_accepted: 'Accepted \w+ for (?P<user>\S+) from (?P<ip>\S+)'
  sudo:         'USER=(?P<target>\S+)\s*;\s*COMMAND=(?P<cmd>.+)$'
  ban:          'fail2ban.*?Ban (?P<ip>\S+)'

# --- Правила обнаружения. --------------------------------------------------
# type: match     - алерт на каждое событие (опционально с фильтром where).
# type: threshold - алерт, если событий с одинаковым group_by >= threshold.
# В message можно подставлять поля события и {count}.
rules:
  - id: ssh_bruteforce
    title: SSH brute-force
    severity: high
    event: ssh_failed
    type: threshold
    group_by: ip
    threshold: 5
    message: '{count} неудачных входов по SSH с {ip}'

  - id: ssh_invalid_user
    title: Несуществующий пользователь
    severity: low
    event: ssh_invalid
    type: threshold
    group_by: ip
    threshold: 1
    message: 'попытки входа под несуществующим пользователем с {ip} (x{count})'

  - id: sudo_root
    title: sudo от root
    severity: medium
    event: sudo
    type: match
    where:
      target: root
    message: 'sudo root: {cmd}'

  - id: fail2ban
    title: fail2ban ban
    severity: medium
    event: ban
    type: match
    message: 'fail2ban забанил {ip}'

  - id: ssh_login
    title: Успешный вход
    severity: info
    event: ssh_accepted
    type: match
    message: 'успешный вход {user} с {ip}'
